services:
  # ── Base de datos ────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo-data:/data/db
    networks: [fruit-net]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cola de mensajes ─────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [fruit-net]

  # ── Backend principal (NestJS + Fastify) ─────────────────────────────────────
  fruit-backend:
    build: ./fruit-backend
    ports:
      - "3001:3000"
    env_file: ./fruit-backend/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [fruit-net]

  # ── Servicio de inferencia Python (YOLO) ─────────────────────────────────────
  fruit-inference:
    build: ./fruit-inference
    ports:
      - "127.0.0.1:8000:8000"
    env_file: ./fruit-inference/.env
    volumes:
      # Monta el modelo .pt desde la carpeta fruit-inference sin incluirlo en la imagen
      - ./fruit-inference/best.pt:/app/model.pt:ro
    networks: [fruit-net]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s # El modelo puede tardar en cargarse

  # ── Microservicio consumidor RabbitMQ (NestJS) ───────────────────────────────
  fruit-ms:
    build: ./fruit-ms
    env_file: ./fruit-ms/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      INFERENCE_URL: http://fruit-inference:8000
      MONGO_URI: mongodb://mongo:27017/fruit_db
    depends_on:
      rabbitmq:
        condition: service_healthy
      fruit-inference:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks: [fruit-net]

networks:
  fruit-net:
    driver: bridge

volumes:
  mongo-data:
